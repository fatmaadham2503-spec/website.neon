<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Win11 Replica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="login-box">
            <div class="user-avatar"></div>
            <h2>System Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Sign In</button>
        </div>
    </div>

    <div id="desktop-screen" class="screen hidden">
        <div class="desktop-icons">
            <div class="app-icon" onclick="openApp('account-app')">
                <svg viewBox="0 0 24 24" class="neon-svg cyan-glow"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span>Account</span>
            </div>
            <div class="app-icon" onclick="openApp('settings-app')">
                <svg viewBox="0 0 24 24" class="neon-svg white-glow"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.3-.06.61-.06.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                <span>Settings</span>
            </div>
            <div class="app-icon" onclick="logout()">
                <svg viewBox="0 0 24 24" class="neon-svg red-glow"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                <span>Logout</span>
            </div>
        </div>

        <div id="account-app" class="window hidden">
            <div class="window-header"><span>Account Info</span><span class="close-btn" onclick="closeApp('account-app')">×</span></div>
            <div class="window-content">
                <p>Username: <br><strong id="display-user" class="neon-text"></strong></p>
                <p>Password: <br><strong id="display-pass" class="neon-text"></strong></p>
            </div>
        </div>

        <div id="settings-app" class="window hidden">
            <div class="window-header"><span>Change Credentials</span><span class="close-btn" onclick="closeApp('settings-app')">×</span></div>
            <div class="window-content">
                <input type="text" id="new-user" placeholder="New Username">
                <input type="password" id="new-pass" placeholder="New Password">
                <button onclick="updateCredentials()">Apply Changes</button>
            </div>
        </div>

        <div class="taskbar">
            <div class="taskbar-center">
                <div class="start-btn" onclick="playSound('click')"></div>
                <div class="taskbar-icon" title="Minimize All" onclick="closeAll()">
                    <svg viewBox="0 0 24 24" fill="white" style="width:20px;"><path d="M4 18h16v2H4z"/></svg>
                </div>
                <div id="clock" class="taskbar-clock">00:00</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
